<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conexión RedJIV</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 --paper:#FBF6EE; --paper2:#F4ECE0; --ink:#2A2620; --muted:#6E6656; --faint:#9A927F; --line:#E7DCCB;
 --amber:#C6772A; --amber-soft:#F3E0C8; --teal:#1E8A78; --teal-soft:#D9EFE8; --rose:#C25B5B;
 --display:"Space Grotesk",-apple-system,system-ui,sans-serif; --body:"Spline Sans",-apple-system,system-ui,sans-serif; --mono:"Space Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.6;font-size:17px;overflow-x:hidden}
a{color:var(--teal)}
.mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;font-size:.66rem}

/* top bar */
.top{position:fixed;top:0;left:0;right:0;z-index:60;padding:14px 20px;display:flex;align-items:center;gap:12px;transition:background .3s,border-color .3s;border-bottom:1px solid transparent}
.top.solid{background:rgba(251,246,238,.9);backdrop-filter:blur(10px);border-bottom-color:var(--line)}
.brand{font-family:var(--display);font-weight:600;font-size:.98rem;cursor:pointer;letter-spacing:-.01em}
.brand .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);margin-right:8px;box-shadow:0 0 10px var(--amber)}
.sp{flex:1}
.tbtn{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line);background:rgba(255,255,255,.6);color:var(--muted);border-radius:999px;padding:7px 12px;cursor:pointer;transition:.15s}
.tbtn:hover{border-color:var(--amber);color:var(--ink)}
.tbtn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.lang{display:flex;gap:5px}

/* hero */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:90px 24px 60px;overflow:hidden}
#field{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.hero .glow{position:absolute;border-radius:50%;filter:blur(90px);z-index:0;pointer-events:none;opacity:.5}
.hero .g1{width:420px;height:420px;background:var(--amber-soft);top:-100px;left:-80px}
.hero .g2{width:460px;height:460px;background:var(--teal-soft);bottom:-160px;right:-100px}
.hero-in{position:relative;z-index:2;max-width:900px;margin:0 auto;width:100%;text-align:center}
.hero .kicker{color:var(--amber);font-family:var(--mono);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase}
.hero h1{font-family:var(--display);font-weight:700;font-size:clamp(2.3rem,6.4vw,4.2rem);line-height:1.03;letter-spacing:-.02em;margin:20px auto 0;max-width:16ch}
.hero .sub{font-size:clamp(1.05rem,2.4vw,1.3rem);color:var(--muted);margin:22px auto 0;max-width:52ch}
.scrollcue{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;color:var(--faint);font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;text-align:center}
.scrollcue .arrow{display:block;margin:8px auto 0;width:18px;height:18px;border-right:2px solid var(--amber);border-bottom:2px solid var(--amber);transform:rotate(45deg);animation:bob 1.8s infinite}
@keyframes bob{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(4px,4px)}}

/* chapters */
.chapter{max-width:820px;margin:0 auto;padding:80px 24px}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease}
.reveal.in{opacity:1;transform:none}
.chapter .tag{color:var(--amber);font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase}
.chapter h2{font-family:var(--display);font-weight:600;font-size:clamp(1.7rem,4.4vw,2.7rem);line-height:1.12;letter-spacing:-.015em;margin:14px 0 0;max-width:18ch}
.chapter p{font-size:clamp(1.05rem,2.2vw,1.22rem);color:var(--muted);margin-top:18px;max-width:56ch}

/* groups */
.band{background:var(--paper2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.groups{max-width:960px;margin:0 auto;padding:80px 24px}
.groups h2{font-family:var(--display);font-weight:700;font-size:clamp(1.8rem,4.4vw,2.7rem);letter-spacing:-.015em;text-align:center}
.groups .gsub{color:var(--muted);text-align:center;max-width:48ch;margin:14px auto 0;font-size:1.08rem}
.gcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:36px}
.gcard{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:24px;cursor:pointer;transition:.2s;text-align:left;position:relative;overflow:hidden}
.gcard:hover{transform:translateY(-4px);border-color:var(--amber);box-shadow:0 14px 34px rgba(198,119,42,.14)}
.gcard .letter{width:46px;height:46px;border-radius:13px;background:var(--amber-soft);color:var(--amber);font-family:var(--display);font-weight:700;font-size:1.3rem;display:flex;align-items:center;justify-content:center}
.gcard.e .letter{background:var(--teal-soft);color:var(--teal)}
.gcard h3{font-family:var(--display);font-weight:600;font-size:1.22rem;margin:16px 0 6px}
.gcard p{color:var(--muted);font-size:.96rem;margin:0}
.gcard .go{margin-top:14px;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber)}

/* horizons */
.horizons{max-width:760px;margin:0 auto;padding:90px 24px}
.horizons h2{font-family:var(--display);font-weight:700;font-size:clamp(1.8rem,4.4vw,2.7rem);letter-spacing:-.015em;text-align:center;margin-bottom:44px}
.hpath{position:relative;padding-left:38px}
.hpath::before{content:"";position:absolute;left:11px;top:6px;bottom:6px;width:2px;background:linear-gradient(var(--amber),var(--teal))}
.hstep{position:relative;padding:0 0 34px}
.hstep::before{content:"";position:absolute;left:-32px;top:4px;width:16px;height:16px;border-radius:50%;background:var(--paper);border:3px solid var(--amber)}
.hstep:last-child{padding-bottom:0}
.hstep:last-child::before{border-color:var(--teal)}
.hstep .w{font-family:var(--display);font-weight:600;font-size:1.2rem}
.hstep .t{color:var(--muted);margin-top:4px;font-size:1.05rem}

/* closing */
.closing{text-align:center;max-width:720px;margin:0 auto;padding:100px 24px}
.closing h2{font-family:var(--display);font-weight:700;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.02em}
.closing p{color:var(--muted);font-size:1.15rem;margin:18px auto 0;max-width:44ch}
.cta{display:inline-block;margin-top:32px;font-family:var(--mono);font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;background:var(--amber);color:#fff;border:0;border-radius:999px;padding:17px 30px;cursor:pointer;text-decoration:none;box-shadow:0 10px 26px rgba(198,119,42,.28);transition:.2s}
.cta:hover{transform:translateY(-2px);background:#B4691f}

/* reader */
.reader{background:var(--paper2);border-top:1px solid var(--line);scroll-margin-top:64px}
.reader-in{max-width:1080px;margin:0 auto;padding:60px 24px 90px}
.reader h2.rt{font-family:var(--display);font-weight:700;font-size:1.9rem;text-align:center;letter-spacing:-.01em}
.doctabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:26px 0 30px}
.doctab{font-family:var(--body);font-size:.9rem;border:1px solid var(--line);background:var(--paper);color:var(--muted);border-radius:999px;padding:9px 15px;cursor:pointer;transition:.15s;display:flex;gap:8px;align-items:baseline}
.doctab .num{font-family:var(--mono);font-size:.66rem;color:var(--faint)}
.doctab:hover{border-color:var(--amber);color:var(--ink)}
.doctab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.doctab.active .num{color:rgba(255,255,255,.6)}
.docwrap{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:30px 34px}
.content{max-width:none}
.content h1{font-family:var(--display);font-weight:700;font-size:clamp(1.7rem,3.6vw,2.3rem);line-height:1.08;letter-spacing:-.02em;margin:0 0 6px}
.content h2{font-family:var(--display);font-weight:600;font-size:1.35rem;margin:28px 0 10px;padding-top:18px;border-top:1px solid var(--line)}
.content h3{font-family:var(--display);font-weight:600;font-size:1.05rem;margin:20px 0 6px}
.content p{margin:0 0 12px;max-width:72ch}
.content ul,.content ol{margin:6px 0 14px;list-style:none}
.content li{position:relative;padding-left:22px;margin-bottom:7px;max-width:72ch}
.content ul>li::before{content:"";position:absolute;left:3px;top:.62em;width:6px;height:6px;border-radius:50%;background:var(--amber)}
.content ol{counter-reset:ol}.content ol>li{counter-increment:ol}
.content ol>li::before{content:counter(ol);position:absolute;left:0;top:0;font-family:var(--mono);font-size:.72rem;color:var(--amber);font-weight:700}
.content li.chk::before{content:"\2610";background:none;font-size:1rem;top:-.05em;left:0;color:var(--faint)}
.content strong{font-weight:600}
.content code{font-family:var(--mono);font-size:.85em;background:var(--paper2);border-radius:5px;padding:2px 6px;color:#5a4b34}
.content pre{background:#2A2620;color:#F3E9D9;border-radius:12px;padding:15px 16px;overflow-x:auto;margin:0 0 14px;font-size:.82rem;line-height:1.55}
.content pre code{background:none;color:inherit;padding:0}
.content blockquote{border-left:3px solid var(--amber);background:var(--paper2);border-radius:0 12px 12px 0;padding:12px 16px;margin:0 0 14px}
.content blockquote p:last-child{margin-bottom:0}
.content table{width:100%;border-collapse:collapse;margin:6px 0 16px;font-size:.9rem;display:block;overflow-x:auto}
.content th,.content td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
.content th{background:var(--amber-soft);font-family:var(--display);font-weight:600;font-size:.82rem;white-space:nowrap}
.content tr:nth-child(even) td{background:var(--paper2)}
.foot{text-align:center;padding:40px 24px 70px;color:var(--faint)}
.foot .f{font-family:var(--display);color:var(--ink);font-weight:600}
.foot .mono{display:block;margin-top:6px;color:var(--faint)}
.printall{display:none}

@media(max-width:600px){ .docwrap{padding:22px 18px} .reader-in{padding:44px 16px 70px} }
@media(prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important} .reveal{opacity:1;transform:none} #field{display:none} }
@media print{
 .top,#field,.hero .glow,.scrollcue,.cta,.doctabs,.foot{display:none!important}
 .hero,.chapter,.band,.horizons,.closing{display:none!important}
 .reader{background:#fff;border:0} .docwrap{border:0;padding:0} #reader-view{display:none!important}
 .printall{display:block!important} .printall .content{page-break-after:always;max-width:100%}
 body{font-size:11pt;background:#fff}
}
</style>
</head>

 <span class="brand" id="brandHome"><span class="dot"></span>Conexión RedJIV</span>

</div>

<script>
var DATA={"es": [{"id": "1", "nav": "El plan", "md": "# 1 · El plan\n\nLa reacción de Conexión RedJIV ante los terremotos del 24 de junio de 2026. Tomamos el talento y las ideas de la red y los ponemos a trabajar en cosas útiles, ya. La gente se suma a un grupo según su experticia y empieza sin adivinar por qué está ahí.\n\nDocumento vivo. Actualizado a inicios de julio de 2026.\n\n## Perfil bajo por diseño\n\nLa primera regla. No buscamos ser famosos ni conocidos. El trabajo importa más que el nombre. El crédito es de las personas que lo hacen, no de la red, que es solo un facilitador discreto. Esto no es falsa modestia: en un entorno con más de 200 sitios bloqueados y vigilancia sobre las comunicaciones, el perfil bajo también protege a quienes están dentro del país. Trabajamos en silencio y dejamos que hablen los resultados y las personas.\n\n## La situación\n\nA inicios de julio de 2026, según la ONU y las autoridades venezolanas y sujeto a cambios: al menos 2.595 fallecidos, unos 12.400 heridos, cerca de 50.000 personas sin localizar y más de 860 réplicas. Dos sismos de magnitud 7,2 y 7,5 con 39 segundos de diferencia el 24 de junio a las 6:04 pm, epicentros cerca de Yumare (Yaracuy). La Guaira es zona de desastre; Caracas y varios estados con daño severo. Unos 58.870 edificios dañados, pérdidas de unos 6.700 millones de dólares (cerca del 6% del PIB), y 1,8 millones de personas necesitan asistencia, 680.000 de ellas niños. El sistema de salud está al límite y la ONU advierte sobre enfermedades infecciosas. Cifras preliminares y en aumento.\n\n## Cómo trabajamos\n\nGrupos listos por experticia. Cada grupo tiene un lead con experiencia que valida el trabajo y conecta con quienes responden en terreno, y espacio para que estudiantes de maestría, doctorado y pregrado ejecuten y salgan como primeros autores del resultado. Distintos niveles, un mismo grupo.\n\nTodo se canaliza a través de organismos ya establecidos (ONU OCHA, UNICEF, Direct Relief, FUNVISIS). No improvisamos en la zona. La ventaja de la red es el trabajo analítico y de información a distancia, el alcance de la diáspora, y la verificación desde quienes están dentro del país.\n\n## Horizontes de tiempo\n\n- **Ahora (primeras semanas).** Activar los grupos. Mapa de necesidades y accesos, guía de agua para campamentos, apoyo directo a quienes responden.\n- **2 a 3 meses.** Primeros entregables por grupo: mapas, protocolos, vigilancia en refugios, material psicosocial. Apoyo sostenido a la respuesta.\n- **1 año.** De la respuesta a la recuperación: datos abiertos, monitoreo ambiental y de salud, y una capacidad instalada de ciencia para emergencias que no se desarme. Formación en el camino.\n- **2 años.** Aporte a la reconstrucción con criterio sismo-resistente, de agua y de salud. La capacidad queda como músculo permanente y varias personas con salidas a su nombre.\n\n## Navegación\n\n- Los grupos y el reto: `2-grupos-y-reto.md`\n- El plan de acción y todos los pasos: `3-plan-de-accion.md`\n- Las 20 ideas y el inventario de talento: `4-ideas-e-inventario.md`\n- Autoría, datos, recursos, perfil e intake: `5-gobernanza.md`\n- Nota para el comité de la asamblea: `6-nota-comite.md`\n"}, {"id": "2", "nav": "Grupos y reto", "md": "# 2 · Los grupos y el reto\n\nReenfocamos las 20 ideas del primer encuentro en cinco grupos de emergencia, y los corremos como una edición temática de CoAfina, con los próximos encuentros como puntos de control de sprint.\n\n## Los cinco grupos\n\nCada grupo tiene un lead senior que valida y conecta con quienes responden, y estudiantes que ejecutan.\n\n### A · Mapa de necesidades y accesos\nDónde no está llegando la ayuda: daños, vías bloqueadas y vacíos de cobertura en La Guaira, Caracas y los estados afectados, para dárselo a quienes responden.\n- Lead: María Vincenti González (GIS, epidemiología) o Luis Montilla.\n- Equipo: Leonardo Manrique (grafos), Reybert Carrillo (geografía), Barbara Montañes (física).\n- Ideas que aporta: 14 (grafos de movilidad urbana), 18 (análisis geoespacial).\n- Primer entregable (para el 24-JUL): mapa reproducible con capas de daño y accesibilidad y una lista de vacíos de cobertura, conectado a OCHA.\n\n### B · Riesgo de réplicas, deslizamientos y sitio seguro\nMapas de susceptibilidad a deslizamientos y licuefacción en la costa de La Guaira y las laderas de Caracas, explicador de réplicas en lenguaje claro y criterios de sitio seguro para campamentos.\n- Lead: Saúl Escobar o Liliana López (geología, UCV, dentro del país).\n- Equipo: Reybert Carrillo, Raffaella Martínez (medios granulares), José Hugo García (IA).\n- Ideas que aporta: 1 (Saúl ya tiene mapas regionales de suelo), 3 (medios granulares).\n- Primer entregable: capa de susceptibilidad y guía de una página sobre réplicas, coordinado con FUNVISIS.\n\n### C · Agua segura y saneamiento\nProtocolo de calidad de agua de bajo costo y una guía práctica de purificación y saneamiento para refugios.\n- Lead: Alejandro Goldar (sistemas de control, ULB) o Mariana Gelambi (Virginia Tech).\n- Equipo: Fernando Méndez (química analítica ambiental), Eduardo Rodríguez-Román (virología), Valentín Brito (polímeros).\n- Ideas que aporta: 13 (aguas residuales), 2 (contaminantes en agua), 7 (microplásticos).\n- Primer entregable (rápido, para el 10-JUL): la guía de purificación lista para imprimir y repartir, coordinada con el clúster WASH.\n\n### D · Salud en refugios y salud mental\nLista de vigilancia de enfermedades en refugios, material de primeros auxilios psicológicos y mapa de salud mental por región.\n- Lead: Juan Carlos Gabaldón (medicina, parasitología) o María Vincenti (epidemiología).\n- Equipo: José Orejas (medicina, base de salud mental por región), Jamileth More (neurociencias, psicosocial), Eduar García, Soriuska Mayora, Fhabián Carrión-Nessi (inmunología), Jesús Afonso Urich (farmacia).\n- Ideas que aporta: 1, 15, 17, 18.\n- Nota: toca datos sensibles. Nada de datos de pacientes en repos públicos.\n\n### E · Backbone de datos, cómputo y coordinación\nSostiene a los demás: el repo, cómputo, hosting de datos, el tablero y el mecanismo para canalizar y financiar el esfuerzo.\n- Lead: Arturo Sánchez, Luis Montilla o José Hugo García.\n- Equipo: Diego Baptista (ciencias de la computación), Roberto Florez Ablan, Víctor Guzmán, Gabriela Quintero.\n- Ideas que aporta: 4 (infraestructura para rescate del conocimiento), 10 (reproducibilidad y nube), 16 (escalar investigación temprana, que aquí canaliza el financiamiento).\n- Primer entregable (día cero): organización de GitHub viva, repo de coordinación y tablero abierto. Ver `3-plan-de-accion.md`.\n\n## Prioridad para arrancar\n\nE primero, porque habilita a los demás. Luego A y C, que dan resultado rápido con baja dependencia de datos. D es el cuarto fuerte, apenas los tres rueden. B entra en paralelo si Saúl y Liliana tienen ancho de banda.\n\n## El reto: edición CoAfina Emergencia\n\nCorremos los cinco grupos como una edición temática de CoAfina, con los encuentros del 10-JUL, 24-JUL y 07-AGO como puntos de control. No es un plan a largo plazo, es una acción con fecha.\n\n## Premios e incentivos\n\nCon perfil bajo, el premio no es fama para la red. Es para la persona:\n\n- **Autoría.** El estudiante que lleva el trabajo sale como primer autor de la salida. Ver `5-gobernanza.md`.\n- **Recursos.** Paquete para el equipo: cómputo o GPU según necesidad, Overleaf premium, grupo de Zotero y un DOI de Zenodo para datos y código.\n- **Reconocimiento interno,** en el encuentro de la red y, cuando aplique, ante los organismos que responden. Sin buscar prensa.\n- **Micro-premio en efectivo** por grupo destacado, a definir según el presupuesto.\n\nEstructura: un premio por grupo. El grupo E, backbone, no compite, es el anfitrión. Jurado corto de dos leads senior que no compitan ese ciclo más un punto de coordinación. Criterio: utilidad real para la emergencia, calidad y reproducibilidad. Se premian entregables, no promesas.\n\n## Financiamiento\n\n- El capítulo venezolano que sirve de canal de financiamiento. [Confirmar nombre y monto disponible.]\n- CoAfina como marco de la edición temática y posible aporte de premios.\n- Créditos de cómputo en la nube solicitados a nombre de la red, para cubrir lo técnico sin gasto directo.\n\nRegla de manejo: el dinero y los recursos se entregan contra entregables, no por inscribirse. Esto mantiene los equipos vivos.\n"}, {"id": "3", "nav": "Plan de acción", "md": "# 3 · Plan de acción y pasos\n\nTodos los pasos, en orden, para pasar del plan a que la gente trabaje.\n\n## Orden general\n\n1. Crear y asegurar la organización de GitHub.\n2. Subir este repo (la página y los documentos).\n3. Enviar el mensaje a los 48 con el enlace del intake.\n4. Abrir el repo de coordinación y el tablero.\n5. Activar los grupos E, A y C. Luego D y B.\n6. Pedir créditos de cómputo y un plan de Overleaf a nombre de la red.\n\n## Paso 1. Crear la organización\n\n1. Entra a GitHub con una cuenta propia de la red, no la de tu trabajo. Mantiene la red independiente y evita enredos de propiedad.\n2. Signo de más, arriba a la derecha, luego New organization. Plan gratuito.\n3. Correo de contacto propio de la red.\n4. No añadas a nadie todavía. Primero se asegura, después se invita.\n\n## Paso 2. Asegurarlo antes de invitar\n\nEn Settings de la organización:\n\n- Authentication security: activa Require two-factor authentication for everyone.\n- Member privileges: baja el permiso base a Read. Nadie tiene escritura global.\n- Repository creation: restríngelo a los owners.\n- Repository visibility: deshabilita que los miembros hagan repos públicos sin permiso.\n\n## Paso 3. Equipos\n\nCinco equipos, con el mínimo permiso que cada uno necesita:\n\n- `owners` coordinación, admin.\n- `mentores-cientificos` leads senior, escritura en su grupo.\n- `mentores-tecnicos` apoyo técnico, escritura en su grupo.\n- `lideres-proyecto` estudiantes que llevan un grupo, mantienen su repo.\n- `miembros` la red, solo lectura salvo invitación a un grupo.\n\n## Paso 4. Repo de coordinación y tablero\n\nCrea el repo `respuesta-emergencia` (privado) con esta estructura:\n\n```\nrespuesta-emergencia/\n  README.md            este reto, principios, enlaces\n  grupos/\n    A-mapa/  B-riesgo/  C-agua/  D-salud/  E-backbone/\n  datos/\n    README.md          reglas de datos, nada sensible en publico\n  situacion/\n    situacion.md       cifras, actualizado cada 24 a 48 h\n```\n\nCada carpeta de grupo arranca con el acta del proyecto y sus primeras cinco tareas como issues.\n\nTablero de proyectos (GitHub Project, tipo board) con estas columnas:\n\n```\nIdeas captadas -> Con enfoque -> Activo -> Apuntando a salida -> Entregado\n                                                                  Latente (pausado)\n```\n\nCarga inicial: A, B y C en Con enfoque; E en Activo; D en Ideas captadas (arranca tras los tres primeros).\n\nComandos, en tu Mac:\n\n```bash\nmkdir respuesta-emergencia && cd respuesta-emergencia\nmkdir -p grupos/A-mapa grupos/B-riesgo grupos/C-agua grupos/D-salud grupos/E-backbone datos situacion\nprintf '# Respuesta emergencia RedJIV\\n' > README.md\nprintf '# Situacion\\n' > situacion/situacion.md\nprintf '# Datos\\nNada sensible en repos publicos.\\n' > datos/README.md\ngit init && git add . && git commit -m \"Arranque respuesta emergencia\"\ngit branch -M main\ngit remote add origin git@github.com:venezuela-org/respuesta-emergencia.git\ngit push -u origin main\n```\n\n## Paso 5. Invitar a la gente\n\n1. En la organización, People, Invite member. Por usuario de GitHub o por correo.\n2. Al invitar, asígnale su equipo, para que caiga con el permiso correcto.\n3. Al invitar a un grupo, dale acceso solo al repo de ese grupo.\n4. Para quien no tenga GitHub, una guía de una página de cómo crear cuenta y activar 2FA.\n\n## Mensaje para los 48\n\nAjusta el enlace del intake y envíalo por el canal habitual del grupo.\n\n> Asunto: CoAfina Emergencia, pongamos la red al servicio del país\n>\n> Hola a todos,\n>\n> Después de los terremotos del 24 de junio, queremos convertir lo que construimos en el primer encuentro en algo útil para el país, ya. Reenfocamos nuestras ideas y talento en una edición de emergencia de CoAfina, con los próximos tres encuentros como puntos de control.\n>\n> Organizamos el esfuerzo en cinco grupos. Cada uno tiene un lead con experiencia que valida y conecta con quienes responden, y espacio para que estudiantes ejecuten y salgan como primeros autores.\n>\n> 1. Mapa de necesidades y accesos. 2. Riesgo de réplicas y sitio seguro. 3. Agua segura y saneamiento. 4. Salud en refugios y salud mental. 5. Backbone de datos y coordinación.\n>\n> Habrá premios por grupo y recursos para los equipos: cómputo, Overleaf, DOI y el aval de la red. El trabajo impulsa tu carrera al mismo tiempo que ayuda.\n>\n> Cómo sumarte: llena el intake aquí [ENLACE]. Nos dice tu perfil, si estás en Venezuela y en qué estado, y en qué grupo puedes aportar y cuántas horas.\n>\n> Dos cosas. Todo se canaliza a través de organismos ya establecidos, no improvisamos en la zona. Y si te viste afectado directamente, dilo con confianza: es para saber quién puede necesitar apoyo, no para dejar a nadie fuera.\n>\n> Gracias por estar. Nos vemos en el próximo encuentro.\n> Arturo, Conexión RedJIV\n\n## Seguridad, recomendación\n\nDado el contexto de Venezuela, esto es importante, no opcional:\n\n- Empieza todo privado. Muestra poco.\n- 2FA obligatoria. Es lo que más protege.\n- No expongas quién está dentro del país ni quién hace qué. Con vigilancia y censura, eso puede poner a alguien en riesgo. Perfiles en repo privado. Seudónimos permitidos.\n- Nada de datos personales, médicos o de ubicación de víctimas en repos públicos.\n- Venezuela bloquea muchos sitios y a veces GitHub o las VPN fallan. Ten el plan también como PDF descargable y un canal alterno para compartirlo dentro del país.\n\n## Checklist\n\n- [ ] Organización creada y asegurada (2FA, permisos, equipos).\n- [ ] Este repo subido (página y documentos).\n- [ ] Consentimiento revisado antes de abrir el intake.\n- [ ] Mensaje a los 48 enviado con el enlace.\n- [ ] Repo de coordinación y tablero abiertos.\n- [ ] Grupos E, A y C activados con lead y primeras tareas.\n- [ ] Créditos de cómputo y Overleaf solicitados.\n- [ ] Cifras de situación actualizadas cada 24 a 48 h.\n"}, {"id": "4", "nav": "Ideas e inventario", "md": "# 4 · Ideas e inventario de talento\n\n## Las 20 ideas del primer encuentro\n\nNada se pierde. Las que alimentan un grupo de emergencia se marcan con el grupo; el resto queda en el backlog de la red para cuando haya capacidad.\n\n| # | Idea | Disciplinas | Destino |\n|---|------|-------------|---------|\n| 1 | Minerales del suelo y salud mental | Medicina × Geología | Grupos B y D |\n| 2 | Contaminantes orgánicos, redes en Mérida | Química × Biología | Grupo C |\n| 3 | IA y medios granulares | IA × Física | Grupo B |\n| 4 | Infraestructura para rescatar el conocimiento | Física × Infra abierta | Grupo E |\n| 5 | Comunicación química bajo ruido urbano | Química × Herpetología | Backlog |\n| 6 | Espectroscopía y electroquímica | Q. física × Electroquímica | Backlog |\n| 7 | Microplásticos y enfermedades autoinmunes | Polímeros × Inmunología | Grupo C |\n| 8 | Optimización de sistemas catalíticos | Matemáticas × Química | Backlog |\n| 9 | Tafonomía molecular de fósiles | Paleontología × Q. comput. | Backlog |\n| 10 | Reproducibilidad y cómputo en la nube | Sistemas complejos × Cómputo | Grupo E |\n| 11 | Cromóforos de briofitas | Fotoquímica × Botánica | Backlog |\n| 12 | Altas energías y fotoquímica | Física teórica × Fotoquímica | Backlog |\n| 13 | Antibióticos en aguas residuales | Virología × Control | Grupo C |\n| 14 | Nodos de movilidad urbana con grafos | Física × Geografía | Grupo A |\n| 15 | Biodisponibilidad de antiparasitarios | Farmacia × Epidemiología | Grupo D |\n| 16 | Escalando investigación temprana | Q. formulación × Cómputo | Grupo E |\n| 17 | Diagnósticos en inmunología con datos VE | Inmunología × Física | Grupo D |\n| 18 | Intervenciones antimaláricas, sur de VE | Medicina × Física | Grupos A y D |\n| 19 | Fisiología cuantitativa en parásitos | Q. medicinal × Fisiología | Backlog (sin descripción) |\n| 20 | Control orbital para el Atelopus cruciger | Biología × Física | Backlog (la destreza puede sumarse a A o C) |\n\nLa fortaleza real del primer encuentro fueron las duplas entre disciplinas que normalmente no se hablan. Esa mezcla es la que hace posible reenfocar rápido.\n\n## El talento de la red\n\n48 personas únicas (registros duplicados consolidados, más los autores de ideas que entraron como invitados). Doble reparto: dentro del país y diáspora.\n\nFortalezas por área: química y materiales 14, física y sistemas complejos 10, salud y biomedicina 9, biología y ecología 5, cómputo y datos 3, geociencias 3, matemáticas 2, más ingeniería de control y paleontología. La mitad dentro del país da acceso a terreno; la diáspora aporta instrumentos, afiliaciones y alcance, repartida en unos 14 países (España, Suiza, Austria, Brasil, EE. UU., Países Bajos, Alemania, Bélgica, Italia, Chile, Francia, Perú, Argentina).\n\nEl inventario completo por persona, con área y país aproximado, está en el archivo `Inventario_talento_RedJIV.xlsx` que acompaña a este repo. País y afiliación se infirieron de dominios de correo y códigos telefónicos, así que son un punto de partida a confirmar.\n\n## Mapa nacional\n\nObjetivo: saber quién está dentro de Venezuela y en qué estado, para ver quién puede estar en la zona afectada y necesitar apoyo, y quién está en zona segura y puede dar relevo de coordinación.\n\nLo inferible hoy: probable Gran Caracas o Distrito Capital (por UCV y USB) para Saúl Escobar, Liliana López, Soriuska Mayora, Raffaella Martínez, Goosline Pereira y David Bellorin; probable Oriente (UDO) para Valentín Brito; el resto dentro del país con estado por confirmar.\n\nEstados más golpeados, para cruzar: La Guaira (Vargas), Distrito Capital, Aragua, Carabobo, Yaracuy. Quien esté en Gran Caracas se contacta primero, con cuidado y para ofrecer apoyo, no para asignar tareas.\n\nLo que falta: el estado dentro de Venezuela es el campo nuevo del intake (`en_venezuela`, `region_estado`). En cuanto la gente lo llene, este mapa deja de ser inferencia y pasa a ser dato. Prioridad: que los que están dentro del país lo llenen primero.\n"}, {"id": "5", "nav": "Gobernanza", "md": "# 5 · Autoría, datos y recursos\n\nLas reglas de la red. Se aceptan al activar un proyecto y se acuerdan antes de cualquier envío.\n\n## Autoría y crédito\n\n- **El joven investigador es primer autor por diseño.** La red existe para impulsar su carrera. El primer lugar le corresponde salvo que el propio equipo acuerde y registre otra cosa.\n- **Taxonomía CRediT.** Cada salida lleva una declaración de quién hizo qué, guardada en el repo del proyecto.\n- **La mentoría es autor senior solo si contribuyó intelectualmente.** Acompañar no es coautoría.\n- **La infraestructura no es autoría.** GitHub, cómputo, Overleaf, coordinación y este respaldo van en agradecimientos, nunca como autor. La red no busca figurar; con perfil bajo, ni siquiera pide aparecer salvo en un agradecimiento breve.\n- **Datos y código** se publican con un DOI (Zenodo) citando como primer responsable a la misma persona, salvo restricción ética o de privacidad.\n\nTexto de agradecimiento sugerido, breve y discreto:\n\n> Este trabajo se desarrolló con apoyo de coordinación e infraestructura de una red de investigadores venezolanos. Los autores conservan la responsabilidad íntegra del contenido.\n\n## Consentimiento y uso de datos\n\nAlineado a un estándar tipo RGPD, porque hay miembros en la UE.\n\n- **Qué recogemos:** un perfil de capacidades y un contacto privado. No recogemos datos sensibles del miembro para el directorio.\n- **Para qué:** emparejar ideas con personas, evaluar idoneidad ante convocatorias y redactar borradores. Base legal: consentimiento. No se vende ni se comparte fuera de la red.\n- **Procesamiento con IA:** el perfil puede procesarse con IA para emparejar y redactar, con consentimiento explícito y separado. Sin ese consentimiento, el perfil se mantiene pero no se procesa con IA.\n- **Derechos:** ver, corregir, borrar y retirar el consentimiento en cualquier momento.\n- **Datos sensibles de investigación** (clínicos, salud mental, geolocalización de casos): nunca en repos públicos. El proyecto arranca privado y necesita un plan de datos y visto bueno ético antes de mover nada. Se prefieren datos sintéticos o agregados para ejemplos públicos.\n\nRegistro de consentimiento, tres casillas con fecha: uso de perfil para coordinar (obligatoria), procesamiento con IA (opcional), figurar en el directorio interno (opcional).\n\n## Etapas y recursos\n\nLos recursos se liberan al alcanzar hitos, no al inscribirse. Lo barato se da con generosidad; el cómputo, cuando el trabajo lo necesita.\n\n| Recurso | Con enfoque | Activo | Apuntando a salida | Entregado |\n|---|---|---|---|---|\n| Repo desde plantilla y tablero | Sí | Sí | Sí | Archivado |\n| Repo de datos privado | No | Si hay datos sensibles | Sí | Archivado |\n| Overleaf | No | Básico | Premium para el equipo | Sí |\n| Grupo Zotero | No | Sí | Sí | Sí |\n| Cómputo / GPU | No | Solo si se demuestra necesidad | Según necesidad | Cierre |\n| DOI Zenodo | No | No | Sí | Sí |\n| Micro-premio | No | No | Si se justifica | Cierre |\n\nUn proyecto que se estanca no se borra: baja a un estado latente visible y puede revivirse.\n\n## Perfil e intake\n\nEl perfil de cada miembro se guarda como YAML en un repo privado. El intake es doble: recoge el perfil de capacidades y la disponibilidad de respuesta a emergencias en una sola pasada.\n\nCampos del perfil: nombre, etapa de carrera, afiliación, país, si está en Venezuela y en qué estado, disciplinas, métodos y técnicas que puede ejecutar, instrumentos y datos a los que accede, software y cómputo, idiomas, horas por semana, qué busca, qué ofrece, objetivos de salida, enlaces, consentimiento, y un bloque de respuesta a emergencias (disponible, en qué grupo, horas, y si se vio afectado directamente). El contacto y el correo viven solo en el repo privado.\n\nPreguntas del intake, en orden: identidad y ubicación (con el estado dentro de Venezuela), capacidades, qué busca y qué ofrece, enlaces y CV opcional, sección de respuesta a emergencias, y al final las tres casillas de consentimiento con el aviso completo enlazado.\n\n## Nota\n\nAntes de abrir el intake y mover datos de miembros o de pacientes, conviene que alguien con base en protección de datos revise el consentimiento y la vía de datos sensibles, sobre todo por los miembros en la UE.\n"}, {"id": "6", "nav": "Nota al comité", "md": "# 6 · Nota para el comité de la asamblea\n\nEstimados colegas,\n\nLes traigo una idea, con humildad y sin ninguna presión.\n\nDespués de los terremotos del 24 de junio, quise ver si podíamos convertir lo que la red construyó en su primer encuentro en algo útil para el país, ya. La idea es sencilla: agrupar a nuestra gente por experticia para que empiece a trabajar de una vez, en cinco frentes concretos, desde ahora y con horizontes de dos a tres meses, un año y dos años, siempre canalizando todo a través de organismos ya establecidos.\n\nDos cosas quiero dejar muy claras.\n\nLa primera es la filosofía: perfil bajo. Esto no busca dar a conocer a la red ni a nadie. El crédito es de quien hace el trabajo. Trabajamos en silencio, y eso además protege a quienes están dentro del país.\n\nLa segunda es que esto es solo una propuesta. Si el comité siente que la red no es el vehículo adecuado para esto, o que no es el momento, lo entiendo por completo y no pasa nada. En ese caso seguiré por mi cuenta, de forma modesta, e invitaré a la Red a través de CC Venezuela.\n\nLes pido solo una lectura y su parecer: sí, no, o cómo lo ajustarían. El plan completo, con los grupos, el reto y todos los pasos, está en este mismo repositorio, en español e inglés.\n\nGracias,\nArturo\n"}], "en": [{"id": "1", "nav": "The plan", "md": "# 1 · The plan\n\nConexión RedJIV's response to the earthquakes of June 24, 2026. We take the network's talent and ideas and put them to work on useful things, now. People join a group by expertise and start without guessing why they are there.\n\nLiving document. Updated early July 2026.\n\n## Low profile by design\n\nThe first rule. We do not seek to be famous or known. The work matters more than the name. Credit belongs to the people who do it, not to the network, which is only a discreet enabler. This is not false modesty: in an environment with more than 200 blocked websites and surveillance over communications, a low profile also protects those inside the country. We work quietly and let the results and the people speak.\n\n## The situation\n\nAs of early July 2026, per the UN and Venezuelan authorities and subject to change: at least 2,595 dead, around 12,400 injured, nearly 50,000 unaccounted for, and more than 860 aftershocks. Two magnitude 7.2 and 7.5 earthquakes 39 seconds apart on June 24 at 6:04 pm, epicenters near Yumare (Yaracuy). La Guaira is a disaster zone; Caracas and several states severely damaged. Around 58,870 buildings damaged, losses of roughly US$6.7 billion (about 6% of GDP), and 1.8 million people in need, 680,000 of them children. The health system is at breaking point and the UN warns of infectious disease. Figures are preliminary and rising.\n\n## How we work\n\nGroups ready by expertise. Each group has an experienced lead who validates the work and connects with responders on the ground, and room for master's, doctoral and undergraduate students to execute and come out as first authors of the result. Different levels, one group.\n\nEverything is channeled through already-established bodies (UN OCHA, UNICEF, Direct Relief, FUNVISIS). We do not improvise in the zone. The network's advantage is remote analytical and information work, the diaspora's reach, and verification from those inside the country.\n\n## Time horizons\n\n- **Now (first weeks).** Activate the groups. Needs-and-access map, water guide for camps, direct support to responders.\n- **2 to 3 months.** First deliverables per group: maps, protocols, shelter surveillance, psychosocial material. Sustained support to the response.\n- **1 year.** From response to recovery: open data, environmental and health monitoring, and a standing science-for-emergencies capacity that does not disband. Training along the way.\n- **2 years.** Contribution to reconstruction with earthquake-resistant, water and health criteria. The capacity remains as permanent muscle, and several people with outputs in their own name.\n\n## Navigation\n\n- The groups and the challenge: `2-groups-and-challenge.md`\n- The action plan and all steps: `3-action-plan.md`\n- The 20 ideas and the talent inventory: `4-ideas-and-people.md`\n- Authorship, data, resources, profile and intake: `5-governance.md`\n- Note for the assembly committee: `6-committee-note.md`\n"}, {"id": "2", "nav": "Groups & challenge", "md": "# 2 · The groups and the challenge\n\nWe refocus the 20 ideas from the first meeting into five emergency groups, and run them as a thematic CoAfina edition, with the upcoming meetings as sprint checkpoints.\n\n## The five groups\n\nEach group has a senior lead who validates and connects with responders, and students who execute.\n\n### A · Needs and access map\nWhere aid is not reaching: damage, blocked roads and coverage gaps in La Guaira, Caracas and affected states, to hand to responders.\n- Lead: María Vincenti González (GIS, epidemiology) or Luis Montilla.\n- Team: Leonardo Manrique (graphs), Reybert Carrillo (geography), Barbara Montañes (physics).\n- Ideas it draws on: 14 (urban mobility graphs), 18 (geospatial analysis).\n- First deliverable (by Jul 24): a reproducible map with damage and accessibility layers and a coverage-gap list, connected to OCHA.\n\n### B · Aftershock, landslide and safe-siting risk\nLandslide and liquefaction susceptibility maps for the La Guaira coast and Caracas hillsides, a plain-language aftershock explainer, and safe-siting criteria for camps.\n- Lead: Saúl Escobar or Liliana López (geology, UCV, inside the country).\n- Team: Reybert Carrillo, Raffaella Martínez (granular media), José Hugo García (AI).\n- Ideas it draws on: 1 (Saúl already has regional soil maps), 3 (granular media).\n- First deliverable: a susceptibility layer and a one-page aftershock guide, coordinated with FUNVISIS.\n\n### C · Safe water and sanitation\nLow-cost water-quality protocol and a practical purification and sanitation guide for shelters.\n- Lead: Alejandro Goldar (control systems, ULB) or Mariana Gelambi (Virginia Tech).\n- Team: Fernando Méndez (environmental analytical chemistry), Eduardo Rodríguez-Román (virology), Valentín Brito (polymers).\n- Ideas it draws on: 13 (wastewater), 2 (water contaminants), 7 (microplastics).\n- First deliverable (fast, by Jul 10): the purification guide ready to print and distribute, coordinated with the WASH cluster.\n\n### D · Shelter health and mental health\nShelter disease-surveillance checklist, psychological first-aid material, and a regional mental-health map.\n- Lead: Juan Carlos Gabaldón (medicine, parasitology) or María Vincenti (epidemiology).\n- Team: José Orejas (medicine, regional mental-health database), Jamileth More (neuroscience, psychosocial), Eduar García, Soriuska Mayora, Fhabián Carrión-Nessi (immunology), Jesús Afonso Urich (pharmacy).\n- Ideas it draws on: 1, 15, 17, 18.\n- Note: touches sensitive data. No patient data in public repos.\n\n### E · Data, compute and coordination backbone\nHolds up the rest: the repo, compute, data hosting, the board, and the mechanism to channel and fund the effort.\n- Lead: Arturo Sánchez, Luis Montilla or José Hugo García.\n- Team: Diego Baptista (computer science), Roberto Florez Ablan, Víctor Guzmán, Gabriela Quintero.\n- Ideas it draws on: 4 (infrastructure for knowledge rescue), 10 (reproducibility and cloud), 16 (scaling early research, which here channels the funding).\n- First deliverable (day zero): a live GitHub organization, coordination repo and open board. See `3-action-plan.md`.\n\n## Where to start\n\nE first, since it enables the rest. Then A and C, which deliver fast with low data dependency. D is the strong fourth, as soon as the three are running. B runs in parallel if Saúl and Liliana have bandwidth.\n\n## The challenge: CoAfina Emergency edition\n\nWe run the five groups as a thematic CoAfina edition, with the meetings of Jul 10, Jul 24 and Aug 7 as checkpoints. This is not a long-term plan, it is an action with a date.\n\n## Prizes and incentives\n\nWith a low profile, the prize is not fame for the network. It is for the person:\n\n- **Authorship.** The student who leads the work is first author of the output. See `5-governance.md`.\n- **Resources.** A package for the team: compute or GPU as needed, Overleaf premium, a Zotero group, and a Zenodo DOI for data and code.\n- **Internal recognition,** at the network meeting and, where applicable, before the responding bodies. No press sought.\n- **A small cash prize** per featured group, to be defined by budget.\n\nStructure: one prize per group. Group E, the backbone, does not compete, it hosts. A short jury of two senior leads not competing that cycle, plus a coordination point. Criterion: real usefulness for the emergency, quality and reproducibility. Deliverables are rewarded, not promises.\n\n## Financing\n\n- The Venezuelan chapter serving as funding channel. [Confirm name and available amount.]\n- CoAfina as the frame of the thematic edition and possible prize contributor.\n- Cloud compute credits requested in the network's name, to cover the technical side without direct spend.\n\nRule: money and resources are granted against deliverables, not on sign-up. This keeps the teams alive.\n"}, {"id": "3", "nav": "Action plan", "md": "# 3 · Action plan and steps\n\nAll the steps, in order, to move from plan to people working.\n\n## Overall order\n\n1. Create and secure the GitHub organization.\n2. Upload this repo (the page and the documents).\n3. Send the message to the 48 with the intake link.\n4. Open the coordination repo and the board.\n5. Activate groups E, A and C. Then D and B.\n6. Request compute credits and an Overleaf plan in the network's name.\n\n## Step 1. Create the organization\n\n1. Sign in to GitHub with an account owned by the network, not your employer's. This keeps the network independent and avoids IP entanglement.\n2. Plus sign, top right, then New organization. Free plan.\n3. A network-owned contact email.\n4. Do not add anyone yet. Secure first, invite after.\n\n## Step 2. Secure it before inviting\n\nIn the organization Settings:\n\n- Authentication security: enable Require two-factor authentication for everyone.\n- Member privileges: lower the base permission to Read. No one has global write.\n- Repository creation: restrict it to owners.\n- Repository visibility: disable members creating public repos without permission.\n\n## Step 3. Teams\n\nFive teams, each with the least permission it needs:\n\n- `owners` coordination, admin.\n- `mentores-cientificos` senior leads, write on their group.\n- `mentores-tecnicos` technical support, write on their group.\n- `lideres-proyecto` students leading a group, maintain their repo.\n- `miembros` the network, read only unless invited to a group.\n\n## Step 4. Coordination repo and board\n\nCreate the repo `respuesta-emergencia` (private) with this structure:\n\n```\nrespuesta-emergencia/\n  README.md            this effort, principles, links\n  grupos/\n    A-mapa/  B-riesgo/  C-agua/  D-salud/  E-backbone/\n  datos/\n    README.md          data rules, nothing sensitive in public\n  situacion/\n    situacion.md        figures, updated every 24 to 48 h\n```\n\nEach group folder starts with the project charter and its first five tasks as issues.\n\nProject board (GitHub Project, board type) with these columns:\n\n```\nIdeas captured -> Scoped -> Active -> Targeting a output -> Delivered\n                                                            Dormant (paused)\n```\n\nInitial load: A, B and C in Scoped; E in Active; D in Ideas captured (starts after the first three).\n\nCommands, on your Mac:\n\n```bash\nmkdir respuesta-emergencia && cd respuesta-emergencia\nmkdir -p grupos/A-mapa grupos/B-riesgo grupos/C-agua grupos/D-salud grupos/E-backbone datos situacion\nprintf '# Emergency response RedJIV\\n' > README.md\nprintf '# Situation\\n' > situacion/situacion.md\nprintf '# Data\\nNothing sensitive in public repos.\\n' > datos/README.md\ngit init && git add . && git commit -m \"Emergency response start\"\ngit branch -M main\ngit remote add origin git@github.com:venezuela-org/respuesta-emergencia.git\ngit push -u origin main\n```\n\n## Step 5. Invite people\n\n1. In the organization, People, Invite member. By GitHub username or email.\n2. When inviting, assign their team, so they land with the right permission.\n3. When inviting to a group, give access only to that group's repo.\n4. For those without GitHub, a one-page guide on creating an account and enabling 2FA.\n\n## Message for the 48\n\nAdjust the intake link and send it through the group's usual channel.\n\n> Subject: CoAfina Emergency, let's put the network at the country's service\n>\n> Hello everyone,\n>\n> After the June 24 earthquakes, we want to turn what we built at the first meeting into something useful for the country, now. We refocus our ideas and talent into a CoAfina emergency edition, with the next three meetings as checkpoints.\n>\n> We organize the effort into five groups. Each has an experienced lead who validates and connects with responders, and room for students to execute and come out as first authors.\n>\n> 1. Needs and access map. 2. Aftershock and safe-siting risk. 3. Safe water and sanitation. 4. Shelter health and mental health. 5. Data and coordination backbone.\n>\n> There will be prizes per group and resources for the teams: compute, Overleaf, DOI and the network's endorsement. The work advances your career while it helps.\n>\n> How to join: fill the intake here [LINK]. It tells us your profile, whether you are in Venezuela and in which state, and which group you can contribute to and how many hours.\n>\n> Two things. Everything is channeled through already-established bodies, we do not improvise in the zone. And if you were directly affected, say so with confidence: it is to know who may need support, not to leave anyone out.\n>\n> Thank you for being here. See you at the next meeting.\n> Arturo, Conexión RedJIV\n\n## Security, recommendation\n\nGiven Venezuela's context, this is important, not optional:\n\n- Start everything private. Show little.\n- Mandatory 2FA. It is the single most protective measure.\n- Do not expose who is inside the country or who does what. With surveillance and censorship, that can put someone at risk. Profiles in a private repo. Pseudonyms allowed.\n- No personal, medical or victim-location data in public repos.\n- Venezuela blocks many sites and GitHub or VPNs sometimes fail. Keep the plan as a downloadable PDF and an alternate channel to share it inside the country.\n\n## Checklist\n\n- [ ] Organization created and secured (2FA, permissions, teams).\n- [ ] This repo uploaded (page and documents).\n- [ ] Consent reviewed before opening the intake.\n- [ ] Message to the 48 sent with the link.\n- [ ] Coordination repo and board opened.\n- [ ] Groups E, A and C activated with lead and first tasks.\n- [ ] Compute credits and Overleaf requested.\n- [ ] Situation figures updated every 24 to 48 h.\n"}, {"id": "4", "nav": "Ideas & people", "md": "# 4 · Ideas and people\n\n## The 20 ideas from the first meeting\n\nNothing is lost. Those that feed an emergency group are marked with the group; the rest stay in the network backlog for when there is capacity.\n\n| # | Idea | Disciplines | Destination |\n|---|------|-------------|-------------|\n| 1 | Soil minerals and mental health | Medicine × Geology | Groups B and D |\n| 2 | Organic contaminants, networks in Mérida | Chemistry × Biology | Group C |\n| 3 | AI and granular media | AI × Physics | Group B |\n| 4 | Infrastructure to rescue knowledge | Physics × Open infra | Group E |\n| 5 | Chemical communication under urban noise | Chemistry × Herpetology | Backlog |\n| 6 | Spectroscopy and electrochemistry | Phys. chem × Electrochemistry | Backlog |\n| 7 | Microplastics and autoimmune disease | Polymers × Immunology | Group C |\n| 8 | Optimization of catalytic systems | Mathematics × Chemistry | Backlog |\n| 9 | Molecular taphonomy of fossils | Paleontology × Comp. chem | Backlog |\n| 10 | Reproducibility and cloud computing | Complex systems × Computing | Group E |\n| 11 | Chromophores of bryophytes | Photochemistry × Botany | Backlog |\n| 12 | High-energy physics and photochemistry | Theoretical physics × Photochem | Backlog |\n| 13 | Antibiotics in wastewater | Virology × Control | Group C |\n| 14 | Urban mobility nodes with graphs | Physics × Geography | Group A |\n| 15 | Bioavailability of antiparasitics | Pharmacy × Epidemiology | Group D |\n| 16 | Scaling early research | Chem. formulation × Computing | Group E |\n| 17 | Immunology diagnostics with VE data | Immunology × Physics | Group D |\n| 18 | Antimalarial interventions, southern VE | Medicine × Physics | Groups A and D |\n| 19 | Quantitative physiology in parasites | Medicinal chem × Physiology | Backlog (no description) |\n| 20 | Orbital control for the Atelopus cruciger | Biology × Physics | Backlog (the skill can join A or C) |\n\nThe real strength of the first meeting was the pairings between disciplines that do not usually talk. That mix is what makes fast refocusing possible.\n\n## The network's talent\n\n48 unique people (duplicate registrations consolidated, plus idea authors who joined as guests). Double spread: inside the country and diaspora.\n\nStrengths by area: chemistry and materials 14, physics and complex systems 10, health and biomedicine 9, biology and ecology 5, computing and data 3, geosciences 3, mathematics 2, plus control engineering and paleontology. Half inside the country gives ground access; the diaspora contributes instruments, affiliations and reach, spread across some 14 countries (Spain, Switzerland, Austria, Brazil, USA, Netherlands, Germany, Belgium, Italy, Chile, France, Peru, Argentina).\n\nThe full per-person inventory, with area and approximate country, is in the file `Inventario_talento_RedJIV.xlsx` that accompanies this repo. Country and affiliation were inferred from email domains and phone codes, so treat them as a starting point to confirm.\n\n## National map\n\nGoal: know who is inside Venezuela and in which state, to see who may be in the affected zone and need support, and who is in a safe zone and can relay coordination.\n\nInferable today: probable Greater Caracas or Capital District (via UCV and USB) for Saúl Escobar, Liliana López, Soriuska Mayora, Raffaella Martínez, Goosline Pereira and David Bellorin; probable eastern region (UDO) for Valentín Brito; the rest inside the country with state to confirm.\n\nHardest-hit states, to cross-reference: La Guaira (Vargas), Capital District, Aragua, Carabobo, Yaracuy. Anyone in Greater Caracas is contacted first, with care and to offer support, not to assign tasks.\n\nWhat is missing: the state inside Venezuela is the new intake field (`en_venezuela`, `region_estado`). Once people fill it, this map stops being inference and becomes data. Priority: those inside the country fill it first.\n"}, {"id": "5", "nav": "Governance", "md": "# 5 · Authorship, data and resources\n\nThe network's rules. Accepted when a project activates and agreed before any submission.\n\n## Authorship and credit\n\n- **The young researcher is first author by design.** The network exists to advance their career. First place is theirs unless the team agrees and records otherwise.\n- **CRediT taxonomy.** Each output carries a statement of who did what, kept in the project repo.\n- **A mentor is senior author only with genuine intellectual contribution.** Accompanying is not co-authorship.\n- **Infrastructure is not authorship.** GitHub, compute, Overleaf, coordination and this support go in acknowledgements, never as an author. The network does not seek billing; with a low profile, it does not even ask to appear except in a brief acknowledgement.\n- **Data and code** are published with a DOI (Zenodo) crediting the same person as first responsible, unless ethics or privacy restricts it.\n\nSuggested acknowledgement, brief and discreet:\n\n> This work was supported by coordination and infrastructure from a network of Venezuelan researchers. The authors retain full responsibility for the content.\n\n## Consent and data use\n\nAligned to a GDPR-style standard, since there are members in the EU.\n\n- **What we collect:** a capability profile and a private contact. We do not collect the member's sensitive data for the directory.\n- **What for:** matching ideas with people, assessing fit for calls, and drafting. Legal basis: consent. Not sold or shared outside the network.\n- **AI processing:** the profile may be processed with AI to match and draft, with explicit, separate consent. Without it, the profile is kept but not processed with AI.\n- **Rights:** view, correct, delete and withdraw consent at any time.\n- **Sensitive research data** (clinical, mental health, case geolocation): never in public repos. The project starts private and needs a data plan and ethics clearance before moving anything. Synthetic or aggregated data preferred for public examples.\n\nConsent record, three dated checkboxes: use of profile to coordinate (required), AI processing (optional), listing in the internal directory (optional).\n\n## Stages and resources\n\nResources are released at milestones, not on sign-up. Cheap things are given generously; compute when the work needs it.\n\n| Resource | Scoped | Active | Targeting a output | Delivered |\n|---|---|---|---|---|\n| Template repo and board | Yes | Yes | Yes | Archived |\n| Private data repo | No | If sensitive data | Yes | Archived |\n| Overleaf | No | Basic | Premium for the team | Yes |\n| Zotero group | No | Yes | Yes | Yes |\n| Compute / GPU | No | Only if demonstrably needed | As needed | Close out |\n| Zenodo DOI | No | No | Yes | Yes |\n| Cash prize | No | No | If justified | Close out |\n\nA project that stalls is not deleted: it drops to a visible dormant state and can revive.\n\n## Profile and intake\n\nEach member's profile is stored as YAML in a private repo. The intake is dual: it collects the capability profile and emergency-response availability in one pass.\n\nProfile fields: name, career stage, affiliation, country, whether inside Venezuela and in which state, disciplines, methods and techniques they can run, instruments and datasets they access, software and compute, languages, hours per week, what they seek, what they offer, output goals, links, consent, and an emergency-response block (available, which group, hours, and whether directly affected). Contact and email live only in the private repo.\n\nIntake questions, in order: identity and location (with the state inside Venezuela), capabilities, what they seek and offer, links and optional CV, an emergency-response section, and at the end the three consent checkboxes with the full notice linked.\n\n## Note\n\nBefore opening the intake and moving member or patient data, someone with a data-protection background should review the consent and the sensitive-data path, especially given members in the EU.\n"}, {"id": "6", "nav": "Committee note", "md": "# 6 · Note for the assembly committee\n\nDear colleagues,\n\nI bring you an idea, with humility and no pressure at all.\n\nAfter the June 24 earthquakes, I wanted to see if we could turn what the network built at its first meeting into something useful to the country, now. The idea is simple: group our people by expertise so they start working right away, on five concrete fronts, from now and with horizons of two to three months, one year and two years, always channeling everything through already-established bodies.\n\nTwo things I want to make very clear.\n\nThe first is the philosophy: low profile. This is not about making the network or anyone known. Credit belongs to whoever does the work. We work quietly, and that also protects those inside the country.\n\nThe second is that this is only a proposal. If the committee feels the network is not the right vehicle for this, or that it is not the moment, I understand completely and it is fine. In that case I will proceed on my own, modestly, and invite the Red through CC Venezuela.\n\nI ask only for a read and your view: yes, no, or how you would adjust it. The full plan, with the groups, the challenge and all the steps, is in this same repository, in Spanish and English.\n\nThank you,\nArturo\n"}]}, STORY={"es": {"hero": {"kicker": "Red de Jóvenes Investigadores de Venezuela", "title": "El conocimiento no se fue. Sigue aquí, conectado.", "sub": "Somos científicos venezolanos, dentro y fuera del país. Cuando la tierra tembló el 24 de junio, nos organizamos para ayudar.", "scroll": "Baja para conocer el plan"}, "chapters": [{"tag": "24 de junio de 2026", "title": "La tierra tembló, y el país entero lo sintió.", "body": "Dos terremotos fuertes golpearon el centro del país. La Guaira y Caracas fueron las zonas más afectadas. Muchas familias lo perdieron todo. Hoy hacen falta refugio, agua, salud y manos que ayuden."}, {"tag": "Quiénes somos", "title": "Una red repartida por el mundo, y por toda Venezuela.", "body": "Algunos están afuera, con laboratorios y contactos. Otros están dentro, cerca de la gente. Entre todos cubrimos el país. Esa mezcla es nuestra fuerza."}, {"tag": "Cómo ayudamos", "title": "Cada quien aporta lo que sabe hacer.", "body": "No sacamos gente de los escombros, para eso están los rescatistas. Hacemos lo que sí sabemos: mapas para ver dónde falta ayuda, agua segura, cuidado de la salud, y coordinación con quienes ya están en terreno."}, {"tag": "Nuestra forma", "title": "Trabajamos en silencio.", "body": "No buscamos fama ni figurar. El mérito es de quien hace el trabajo. Y trabajar sin ruido también cuida a quienes están dentro del país."}], "groupsTitle": "Cinco maneras de ayudar", "groupsSub": "Te sumas a una y empiezas. Cada una la guía alguien con experiencia y la hacen crecer los más jóvenes.", "groups": [{"l": "A", "n": "Mapa de ayuda", "d": "Ver dónde hace falta y cómo llegar."}, {"l": "B", "n": "Tierra segura", "d": "Riesgo de réplicas y dónde es seguro."}, {"l": "C", "n": "Agua limpia", "d": "Agua y sanidad para los refugios."}, {"l": "D", "n": "Salud y ánimo", "d": "Cuidar el cuerpo y también el ánimo."}, {"l": "E", "n": "La base", "d": "Une y sostiene a todos los grupos."}], "horizonsTitle": "No venimos por un día", "horizons": [{"w": "Ahora", "t": "Activamos los grupos y ayudamos en lo urgente."}, {"w": "En meses", "t": "Mapas, agua, salud. Resultados que sirven de verdad."}, {"w": "En un año", "t": "De ayudar pasamos a reconstruir, y a enseñar."}, {"w": "En dos años", "t": "Reconstrucción con ciencia. Y la red se queda."}], "closeTitle": "Este plan es de todos.", "closeBody": "Aquí abajo está completo, en palabras claras y en dos idiomas. Léelo, compártelo, súmate.", "closeCta": "Leer el plan completo", "readerTitle": "El plan completo", "printLabel": "Imprimir / PDF", "planLink": "Plan completo", "backTop": "Volver arriba"}, "en": {"hero": {"kicker": "Network of Young Venezuelan Researchers", "title": "The knowledge did not leave. It is still here, connected.", "sub": "We are Venezuelan scientists, inside and outside the country. When the ground shook on June 24, we organized to help.", "scroll": "Scroll to see the plan"}, "chapters": [{"tag": "June 24, 2026", "title": "The ground shook, and the whole country felt it.", "body": "Two strong earthquakes hit the center of the country. La Guaira and Caracas were the hardest hit. Many families lost everything. Right now shelter, water, health and helping hands are needed."}, {"tag": "Who we are", "title": "A network spread across the world, and across Venezuela.", "body": "Some are abroad, with labs and contacts. Others are inside, close to people. Together we cover the country. That mix is our strength."}, {"tag": "How we help", "title": "Each of us brings what we know how to do.", "body": "We do not pull people from the rubble, that is for rescue teams. We do what we do know: maps to see where help is missing, safe water, health care, and coordination with those already on the ground."}, {"tag": "Our way", "title": "We work quietly.", "body": "We do not seek fame or the spotlight. Credit belongs to whoever does the work. And working without noise also protects those inside the country."}], "groupsTitle": "Five ways to help", "groupsSub": "You join one and start. Each is led by someone experienced and grown by the younger ones.", "groups": [{"l": "A", "n": "Help map", "d": "See where help is missing and how to get there."}, {"l": "B", "n": "Safe ground", "d": "Aftershock risk and where it is safe."}, {"l": "C", "n": "Clean water", "d": "Water and sanitation for the shelters."}, {"l": "D", "n": "Health and spirit", "d": "Care for the body and the spirit too."}, {"l": "E", "n": "The backbone", "d": "Connects and holds up every group."}], "horizonsTitle": "We are not here for one day", "horizons": [{"w": "Now", "t": "We activate the groups and help with the urgent."}, {"w": "In months", "t": "Maps, water, health. Results that truly help."}, {"w": "In a year", "t": "From helping we move to rebuilding, and teaching."}, {"w": "In two years", "t": "Reconstruction with science. And the network stays."}], "closeTitle": "This plan belongs to everyone.", "closeBody": "Below it is complete, in clear words and in two languages. Read it, share it, join.", "closeCta": "Read the full plan", "readerTitle": "The full plan", "printLabel": "Print / PDF", "planLink": "Full plan", "backTop": "Back to top"}};

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function inline(s){s=esc(s);s=s.replace(/`([^`]+)`/g,function(m,c){return "<code>"+c+"</code>";});s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');return s;}
function renderMD(md){
 var L=md.replace(/\r/g,"").split("\n"),o=[],i=0;
 while(i<L.length){var line=L[i];
  if(/^```/.test(line)){var c=[];i++;while(i<L.length&&!/^```/.test(L[i])){c.push(L[i]);i++;}i++;o.push("<pre><code>"+esc(c.join("\n"))+"</code></pre>");continue;}
  if(/^\s*\|.*\|\s*$/.test(line)&&i+1<L.length&&/^\s*\|[\s:|-]+\|\s*$/.test(L[i+1])){
   var hd=line.trim().replace(/^\||\|$/g,"").split("|").map(function(x){return x.trim();});i+=2;var rows=[];
   while(i<L.length&&/^\s*\|.*\|\s*$/.test(L[i])){rows.push(L[i].trim().replace(/^\||\|$/g,"").split("|").map(function(x){return x.trim();}));i++;}
   var t="<table><thead><tr>";hd.forEach(function(h){t+="<th>"+inline(h)+"</th>";});t+="</tr></thead><tbody>";
   rows.forEach(function(r){t+="<tr>";r.forEach(function(cc){t+="<td>"+inline(cc)+"</td>";});t+="</tr>";});t+="</tbody></table>";o.push(t);continue;}
  var h=/^(#{1,6})\s+(.*)$/.exec(line);if(h){var lv=h[1].length;o.push("<h"+lv+">"+inline(h[2])+"</h"+lv+">");i++;continue;}
  if(/^>\s?/.test(line)){var q=[];while(i<L.length&&/^>\s?/.test(L[i])){q.push(L[i].replace(/^>\s?/,""));i++;}var ps=q.join("\n").split(/\n\s*\n/);o.push("<blockquote>"+ps.map(function(p){return "<p>"+inline(p.replace(/\n/g," "))+"</p>";}).join("")+"</blockquote>");continue;}
  if(/^\s*[-*]\s+/.test(line)){var it=[];while(i<L.length&&/^\s*[-*]\s+/.test(L[i])){var raw=L[i].replace(/^\s*[-*]\s+/,"");var ck=/^\[[ xX]\]\s+/.test(raw);if(ck)raw=raw.replace(/^\[[ xX]\]\s+/,"");it.push("<li"+(ck?' class="chk"':'')+">"+inline(raw)+"</li>");i++;}o.push("<ul>"+it.join("")+"</ul>");continue;}
  if(/^\s*\d+\.\s+/.test(line)){var oi=[];while(i<L.length&&/^\s*\d+\.\s+/.test(L[i])){oi.push("<li>"+inline(L[i].replace(/^\s*\d+\.\s+/,""))+"</li>");i++;}o.push("<ol>"+oi.join("")+"</ol>");continue;}
  if(/^\s*$/.test(line)){i++;continue;}
  var pa=[line];i++;while(i<L.length&&!/^\s*$/.test(L[i])&&!/^(#{1,6}\s|>\s?|```|\s*[-*]\s+|\s*\d+\.\s+)/.test(L[i])&&!/^\s*\|.*\|\s*$/.test(L[i])){pa.push(L[i]);i++;}
  o.push("<p>"+inline(pa.join(" "))+"</p>");
 }
 return o.join("\n");
}

function T(){return STORY[lang];}
function txt(id,v){document.getElementById(id).textContent=v;}

function renderStory(){
 var s=T();
 document.documentElement.lang=lang;
 txt("h-kick",s.hero.kicker);txt("h-title",s.hero.title);txt("h-sub",s.hero.sub);txt("h-scroll",s.hero.scroll);
 var ch=document.getElementById("chapters");
 ch.innerHTML=s.chapters.map(function(c){return '<section class="chapter reveal"><div class="tag">'+c.tag+'</div><h2>'+c.title+'</h2><p>'+c.body+'</p></section>';}).join("");
 txt("g-title",s.groupsTitle);txt("g-sub",s.groupsSub);
 var gc=document.getElementById("gcards");
 gc.innerHTML=s.groups.map(function(g){return '<button class="gcard reveal'+(g.l==="E"?" e":"")+'" data-doc="2"><span class="letter">'+g.l+'</span><h3>'+g.n+'</h3><p>'+g.d+'</p><div class="go">'+(lang==="es"?"Ver en el plan":"See in the plan")+' &rarr;</div></button>';}).join("");
 gc.querySelectorAll(".gcard").forEach(function(b){b.addEventListener("click",function(){openDoc("2");});});
 txt("hz-title",s.horizonsTitle);
 document.getElementById("hpath").innerHTML=s.horizons.map(function(h){return '<div class="hstep reveal"><div class="w">'+h.w+'</div><div class="t">'+h.t+'</div></div>';}).join("");
 txt("c-title",s.closeTitle);txt("c-body",s.closeBody);txt("c-cta",s.closeCta);
 document.getElementById("planBtn").textContent=s.planLink;
 document.getElementById("printBtn").textContent=s.printLabel;
 txt("r-title",s.readerTitle);
 document.getElementById("foot-sub").textContent=(lang==="es"?"Red de Jóvenes Investigadores de Venezuela · perfil bajo":"Network of Young Venezuelan Researchers · low profile");
 buildTabs();renderDoc();buildPrintAll();observe();
}

function buildTabs(){
 var tabs=document.getElementById("doctabs");
 tabs.innerHTML=DATA[lang].map(function(d){return '<button class="doctab'+(d.id===activeDoc?" active":"")+'" data-doc="'+d.id+'"><span class="num">'+d.id+'</span><span>'+d.nav+'</span></button>';}).join("");
 tabs.querySelectorAll(".doctab").forEach(function(b){b.addEventListener("click",function(){activeDoc=b.getAttribute("data-doc");buildTabs();renderDoc();});});
}
function renderDoc(){var d=DATA[lang].filter(function(x){return x.id===activeDoc;})[0];document.getElementById("reader-view").innerHTML=renderMD(d.md);}
function buildPrintAll(){document.getElementById("printall").innerHTML=DATA[lang].map(function(d){return '<div class="content">'+renderMD(d.md)+'</div>';}).join("");}
function openDoc(id){activeDoc=id;buildTabs();renderDoc();document.getElementById("reader").scrollIntoView({behavior:"smooth"});}

function setLang(l){lang=l;document.getElementById("bes").classList.toggle("on",l==="es");document.getElementById("ben").classList.toggle("on",l==="en");renderStory();}

var io;
function observe(){
 if(io)io.disconnect();
 io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add("in");});},{threshold:.15});
 document.querySelectorAll(".reveal").forEach(function(el){io.observe(el);});
}

document.getElementById("bes").addEventListener("click",function(){setLang("es");});
document.getElementById("ben").addEventListener("click",function(){setLang("en");});
document.getElementById("printBtn").addEventListener("click",function(){window.print();});
document.getElementById("planBtn").addEventListener("click",function(){document.getElementById("reader").scrollIntoView({behavior:"smooth"});});
document.getElementById("c-cta").addEventListener("click",function(){document.getElementById("reader").scrollIntoView({behavior:"smooth"});});
document.getElementById("brandHome").addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"});});
window.addEventListener("scroll",function(){document.getElementById("top").classList.toggle("solid",window.scrollY>40);});

/* gentle warm node field */
(function(){
 var c=document.getElementById("field");if(!c)return;var ctx=c.getContext("2d");
 if(matchMedia("(prefers-reduced-motion:reduce)").matches)return;
 var w,h,n,raf,dpr=Math.min(window.devicePixelRatio||1,2);
 function size(){w=c.width=c.offsetWidth*dpr;h=c.height=c.offsetHeight*dpr;init();}
 function init(){var count=Math.max(16,Math.min(30,Math.floor(w/90)));n=[];for(var i=0;i<count;i++)n.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.10*dpr,vy:(Math.random()-.5)*.10*dpr,r:(Math.random()*1.6+1.2)*dpr,warm:Math.random()<.6});}
 function frame(){ctx.clearRect(0,0,w,h);
  for(var i=0;i<n.length;i++){var a=n[i];a.x+=a.vx;a.y+=a.vy;if(a.x<0||a.x>w)a.vx*=-1;if(a.y<0||a.y>h)a.vy*=-1;}
  for(var i=0;i<n.length;i++)for(var j=i+1;j<n.length;j++){var a=n[i],b=n[j],dx=a.x-b.x,dy=a.y-b.y,dist=Math.sqrt(dx*dx+dy*dy),max=170*dpr;
   if(dist<max){var al=(1-dist/max)*.22;var g=ctx.createLinearGradient(a.x,a.y,b.x,b.y);g.addColorStop(0,"rgba(198,119,42,"+al+")");g.addColorStop(1,"rgba(30,138,120,"+al+")");ctx.strokeStyle=g;ctx.lineWidth=dpr;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
  for(var i=0;i<n.length;i++){var a=n[i];ctx.fillStyle=a.warm?"rgba(198,119,42,.9)":"rgba(30,138,120,.85)";ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,7);ctx.fill();}
  raf=requestAnimationFrame(frame);}
 size();window.addEventListener("resize",function(){cancelAnimationFrame(raf);size();frame();});frame();
})();

setLang("es");
</script>
